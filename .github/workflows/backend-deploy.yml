name: Deploy backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/backend-deploy.yml'

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    if: github.repository == 'gfcarlos04-del/ERP-WEB'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN no está configurado en GitHub Secrets. Salteando deploy."
            exit 0
          fi
          railway up --service erp-web-backend --detach

      - name: Notify deploy result
        if: always()
        run: |
          echo "Deploy backend status: ${{ job.status }}"
