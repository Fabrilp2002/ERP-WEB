name: Backend tests

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'pytest.ini'
      - '.github/workflows/backend-test.yml'
  push:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - 'tests/**'

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/erp_test
          JWT_SECRET_KEY: test_secret_key_only_for_ci
          GEMINI_API_KEY: dummy_for_tests
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: dummy_service_role_key
        run: pytest tests/ -v --tb=short
